<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hamburguer 543 - Cadastro</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body class="body-cadastro">
    <header class="menu">
        <nav class="nav-bar">
            <a href="../index.html" class="area-logo">
                <img src="../IMG/gourmet-cheeseburger-with-pickles-and-sauce-isolated-on-transparent-background-free-png.png" alt="Logo hamburguer" id="logo">
            </a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="../index.html" class="nav-link">HOME</a>
                </li>
                <li class="nav-item">
                    <a href="hamburguers.html" class="nav-link">HAMBURGUERS</a>
                </li>
                <li class="nav-item">
                    <a href="cadastro.html" class="nav-link">CADASTRO</a>
                </li>
                <li class="nav-item">
                    <a href="contato.html" class="nav-link">CONTATO</a>
                </li>


            </ul>
            <a href="login.html" class="area-login">
                <button class="login">LOGAR</button>
            </a>

        </nav>
    </header>
    <div class="box-cadastro">
        <form action="">
            <fieldset>
                <legend>FORMULÁRIO DE CADASTRO DE CLIENTES</legend>
                <div class="inputBox">
                    <input type="text" name="nome" id="nome" class="inputUser" placeholder="" required>
                    <label for="nome" class="labelInput">Nome Completo</label>
                </div>
                <div class="inputBox">
                    <input type="email" name="email" id="email" class="inputUser" placeholder="" required>
                    <label for="email" class="labelInput">E-Mail</label>
                </div>
                <div class="inputBox">
                    <input type="tel" name="telefone" id="telefone" class="inputUser" placeholder="" required>
                    <label for="telefone" class="labelInput">Telefone</label>
                </div>
                <div class="area-genero">
                    <p>Sexo:</p>
                    <div class="opcao-genero">
                        <input type="radio" name="genero" id="feminino" required >
                        <label for="feminino">Feminino</label>
                    </div>
                    <div class="opcao-genero">
                        <input type="radio" name="genero" id="masculino" required>
                        <label for="feminino">Masculino</label>
                    </div>
                    <div class="opcao-genero">    
                        <input type="radio" name="genero" id="outro" required>
                        <label for="outro">Outro</label>
                    </div>
                </div>

                <div class="area-dn">

                    <label for="data_nascimento">Data de Nascimento:</label>
                    <input type="date" name="data_nascimento" id="data_nascimento" placeholder="" required>
                    
                </div>
                <div class="inputBox">
                    <input type="text" name="cidade" id="cidade" class="inputUser" placeholder="" required>
                    <label for="cidade" class="labelInput">Cidade</label>
                </div>
                <div class="inputBox">
                    <input type="text" name="estado" id="estado" class="inputUser" placeholder="" required>
                    <label for="estado" class="labelInput">Estado</label>
                </div>
                <div class="inputBox">
                    <input type="text" name="endereco" id="endereco" class="inputUser" placeholder="" required>
                    <label for="endereco" class="labelInput">Endereço</label>
                </div>
                <input type="submit" value="ENVIAR" name="submit" id="submit">
            </fieldset>
        </form>
    </div>
</body>
</html>

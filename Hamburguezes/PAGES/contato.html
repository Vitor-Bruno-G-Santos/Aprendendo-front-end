<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamburguer 543 - Contato</title>
    <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
    <header class="menu">
        <nav class="nav-bar">
            <a href="../index.html" class="area-logo">
                <img src="../IMG/gourmet-cheeseburger-with-pickles-and-sauce-isolated-on-transparent-background-free-png.png" alt="Logo hamburguer" id="logo">
            </a>
            <ul class="nav-menu">
                <li class="nav-item">
                    <a href="../index.html" class="nav-link">HOME</a>
                </li>
                <li class="nav-item">
                    <a href="hamburguers.html" class="nav-link">HAMBURGUERS</a>
                </li>
                <li class="nav-item">
                    <a href="cadastro.html" class="nav-link">CADASTRO</a>
                </li>
                <li class="nav-item">
                    <a href="contato.html" class="nav-link">CONTATO</a>
                </li>


            </ul>
            <a href="login.html" class="area-login">
                <button class="login">LOGAR</button>
            </a>

        </nav>
    </header>

    <div class="box-contato">
        <form action="">
            <fieldset>
                <legend>Entre em contato conosco</legend>
                <div class="inputBox-contato">
                    <label for="telefone" class="labelInputContato">Telefone</label>
                    <input type="tel" name="telefone" id="telefone" class="inputContato" required>
                </div>
                <div class="inputBox-contato">
                    <label for="Nome" class="labelInputContato">Nome</label>
                    <input type="text" name="Nome" id="Nome" class="inputContato" required>
                </div>
                <div class="inputBox-contato">
                    <label for="Email" class="labelInputContato">Email</label>
                    <input type="email" name="Email" id="Email" class="inputContato" required>
                </div>
                <div class="inputBox-contato">
                    <label for="Mensagem" class="labelInputContato">Mensagem</label>
                    <textarea type="text" name="Mensagem" id="Mensagem" class="inputMensagemContato" required></textarea>
                </div>
                
                <input type="submit" value="ENVIAR" name="submit" id="submitContato">
            </fieldset>
        </form>
    </div>

</body>
</html>

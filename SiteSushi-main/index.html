<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi 543</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <script src="JS/menu.js" defer></script>
</head>
<body>
    <header>
        <nav class="nav-bar">
            <i class="fa-solid fa-fish" id="nav-logo">FOOD</i>
            <ul class="nav-list">
                <li class="nav-item"><a href="#home">Home</a></li>
                <li class="nav-item"><a href="#cardapio">Cardápio</a></li>
                <li class="nav-item"><a href="#avaliacoes">Avaliações</a></li>
            </ul>
            <button class="btn-default">
                Peça Aqui
            </button>
        </nav>

        <button class="mobile-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
        <div class="mobile-menu">
            <ul class="mobile-nav-list">
                <li class="-nav-item"><a href="#home">Home</a></li>
                <li class="-nav-item"><a href="#cardapio">Cardápio</a></li>
                <li class="-nav-item"><a href="#avaliacoes">Avaliações</a></li>
            </ul>
        </div>

    </header>

    <main class="content">
        <section class="Home" id="#home">
            <div class="shape"></div>
            <div class="cta">
                <h1>
                    O sabor que vai até <span>você.</span>
                </h1>
                <p class="descricao">
                    Venha experimentar uma viagem gastronômica única, onde cada prato é preparado com igredientes frescos e alta qualidade.
                </p>
                <div class="cta-buttons">
                    <a href="#cardapio" class="btn-default">Ver Cardápio</a>
                    <a href="" id="phone-button">
                        <button class="btn-default">
                            <i class="fa-solid fa-phone-volume"></i>
                        </button>
                        (67)0002-8922
                    </a>
                </div>
                <div class="social-media-btn">
                    <i class="fa-brands fa-instagram"></i>
                    <i class="fa-brands fa-facebook"></i>
                    <i class="fa-brands fa-whatsapp"></i>
                </div>
            </div>

            <div class="banner">
                <img src="cozinha sushi/12.png" alt="imagem principal do sushi">
            </div>

        </section>
    </main>
    <section class="cardapio" id="#cardapio">

    </section>
    <section class="avaliacao" id="#avaliacoes">

    </section>



</body>
</html>
